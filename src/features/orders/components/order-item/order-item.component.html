@if (presenter.hasItem) {
  <div
    class="flex items-center gap-3 px-4 py-2 rounded-lg bg-base-300"
    [attr.data-testid]="orderItemTestId"
  >
    <div class="flex flex-1 gap-6 flex-wrap">
      <div>
        <div class="text-xs text-base-content/40 uppercase tracking-wider">id</div>
        <code class="text-sm">{{ presenter.itemId }}</code>
      </div>
      <div>
        <div class="text-xs text-base-content/40 uppercase tracking-wider">product id</div>
        <code class="text-sm">{{ presenter.productId }}</code>
      </div>
      <div>
        <div class="text-xs text-base-content/40 uppercase tracking-wider">quantity</div>
        <div class="badge badge-neutral badge-sm mt-1">{{ presenter.productQuantity }}</div>
      </div>
    </div>
    <button
      class="btn btn-xs btn-error btn-outline"
      [attr.data-testid]="deleteItemButtonTestId"
      [disabled]="presenter.isDeleteItemButtonDisabled"
      (click)="controller.deleteOrderItemButtonClicked()"
    >
      Delete Item
    </button>
  </div>
}
