<div class="w-140 max-w-full text-left" [attr.data-testid]="ordersTestId">
  <h2 class="text-lg font-bold tracking-widest uppercase mb-5">Orders</h2>
  <div class="mb-5">
    <div class="text-xs text-base-content/40 uppercase tracking-widest mb-2">Resource</div>
    <div class="flex items-center justify-between">
      <app-orders-resource-picker />
      <div [class]="'badge gap-1 ' + (presenter.isProcessing ? 'badge-warning' : 'badge-success')">
        @if (presenter.isProcessing) {
          <span class="loading loading-spinner loading-xs"></span>
        }
        {{ presenter.statusLabel }}
      </div>
    </div>
  </div>
  <div class="mb-5">
    <div class="text-xs text-base-content/40 uppercase tracking-widest mb-2">Statistics</div>
    <app-orders-statistics />
  </div>
  <div class="flex flex-col gap-3">
    @for (orderId of presenter.orderIds; track orderId) {
      <app-order [orderId]="orderId" />
    }
  </div>
</div>
