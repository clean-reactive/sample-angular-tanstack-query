<div class="join">
  <input
    class="join-item btn btn-sm"
    type="radio"
    name="orders-resource"
    aria-label="Local"
    value="local"
    [checked]="isLocalChecked"
    (change)="onLocalChanged()"
  />
  <input
    class="join-item btn btn-sm"
    type="radio"
    name="orders-resource"
    aria-label="Remote"
    value="remote"
    [checked]="isRemoteChecked"
    (change)="onRemoteChanged()"
  />
</div>
